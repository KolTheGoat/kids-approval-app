<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>אפליקציית הסעות</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">ניהול הסעות לפעולה</p>
        <h1>אפליקציית הסעות</h1>
      </div>
      <button class="install-button" id="installButton" hidden>התקן כאפליקציה</button>
    </header>

    <main class="shell">
      <section class="panel driver-panel" aria-labelledby="driverTitle">
        <div class="panel-heading">
          <span class="panel-icon" aria-hidden="true">🚗</span>
          <div>
            <h2 id="driverTitle">פרטי נהג</h2>
            <p>פותחים הסעה חדשה ומגדירים מאיפה יוצאים, כמה מקומות יש ולאן נוסעים.</p>
          </div>
        </div>

        <form id="driverForm" class="form-grid">
          <label>
            שם הנהג
            <input id="driverName" name="driverName" autocomplete="name" required />
          </label>
          <label>
            מאיפה יוצא
            <input id="driverOrigin" name="driverOrigin" required />
          </label>
          <label>
            מס' מקומות ברכב
            <input id="driverSeats" name="driverSeats" type="number" min="1" max="9" value="4" required />
          </label>
          <label>
            הכתובת שאליה מכוונים
            <input id="driverDestination" name="driverDestination" placeholder="לדוגמה: בית הפעולה" required />
          </label>
          <button type="submit" class="primary-action">הוסף הסעה</button>
        </form>
      </section>

      <section class="panel passenger-panel" aria-labelledby="passengerTitle">
        <div class="panel-heading">
          <span class="panel-icon" aria-hidden="true">📍</span>
          <div>
            <h2 id="passengerTitle">פרטי נוסע</h2>
            <p>רושמים נוסע ומחברים אותו להסעה קיימת לאישור.</p>
          </div>
        </div>

        <form id="passengerForm" class="form-grid">
          <label>
            שם הנוסע
            <input id="passengerName" name="passengerName" autocomplete="name" required />
          </label>
          <label>
            כתובת הנוסע
            <input id="passengerAddress" name="passengerAddress" required />
          </label>
          <label class="wide-field">
            בחר הסעה
            <select id="rideSelect" name="rideSelect" required></select>
          </label>
          <button type="submit" class="primary-action">שלח לאישור</button>
        </form>
      </section>

      <section class="dashboard" aria-labelledby="dashboardTitle">
        <div class="dashboard-heading">
          <div>
            <p class="eyebrow">אישור ההסעה</p>
            <h2 id="dashboardTitle">בקשות ומקומות פנויים</h2>
          </div>
          <div class="filters" role="group" aria-label="סינון בקשות">
            <button class="filter active" data-filter="all" type="button">הכול</button>
            <button class="filter" data-filter="pending" type="button">ממתין</button>
            <button class="filter" data-filter="approved" type="button">מאושר</button>
            <button class="filter" data-filter="rejected" type="button">נדחה</button>
          </div>
        </div>

        <div class="stats" aria-label="סיכום הסעות">
          <article>
            <strong id="pendingCount">0</strong>
            <span>ממתינים לאישור</span>
          </article>
          <article>
            <strong id="approvedCount">0</strong>
            <span>נוסעים מאושרים</span>
          </article>
          <article>
            <strong id="openSeatsCount">0</strong>
            <span>מקומות פנויים</span>
          </article>
        </div>

        <div class="split-view">
          <section aria-labelledby="ridesTitle">
            <h3 id="ridesTitle">הסעות פעילות</h3>
            <div id="ridesList" class="card-list"></div>
          </section>
          <section aria-labelledby="requestsTitle">
            <h3 id="requestsTitle">בקשות נוסעים</h3>
            <div id="requestsList" class="card-list"></div>
          </section>
        </div>
      </section>
    </main>

    <template id="rideTemplate">
      <article class="ride-card">
        <div class="card-top">
          <h4></h4>
          <span class="seat-badge"></span>
        </div>
        <dl>
          <div>
            <dt>יוצא מ</dt>
            <dd data-origin></dd>
          </div>
          <div>
            <dt>יעד</dt>
            <dd data-destination></dd>
          </div>
        </dl>
      </article>
    </template>

    <template id="requestTemplate">
      <article class="request-card">
        <div class="card-top">
          <h4></h4>
          <span class="status-badge"></span>
        </div>
        <p class="route-line"></p>
        <p class="driver-line"></p>
        <div class="actions">
          <button class="approve" type="button">אשר</button>
          <button class="reject" type="button">דחה</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
